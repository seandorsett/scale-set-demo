# =============================================================================
# Helm Values: Runner Scale Set (Repository Level)
# =============================================================================
# This values file configures a runner scale set for a specific repository.
# Instead of writing separate RunnerDeployment and HorizontalRunnerAutoscaler
# objects like legacy ARC, we keep everything in one Helm values file.
#
# PRESENTATION TALKING POINT:
# "This replaces the old RunnerDeployment YAML sprawl with one values file."
# =============================================================================

## The scale set name is the single routing label used in workflows.
## Legacy ARC often needed label arrays plus separate RunnerDeployment objects.
runnerScaleSetName: "arc-runner-set-repo"

## GitHub configuration
githubConfigUrl: "https://github.com/seandorsett/super-tribble"

## Authentication — using a pre-created Kubernetes secret (recommended)
## Create with: kubectl create secret generic github-pat-secret \
##   --namespace=arc-runners --from-literal=github_token=<PAT>
githubConfigSecret: github-pat-secret

## Auto-scaling configuration
## Legacy ARC split this behavior across RunnerDeployment + HRA resources.
## Runner Scale Sets keep it here and allow true scale-to-zero.
maxRunners: 10       # Never exceed 10 runners (cost control)
minRunners: 0        # Scale to zero when idle (cost savings)

## Runner pod template
## Still declarative, but much simpler than managing multiple legacy ARC CRDs.
template:
  spec:
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command: ["/home/runner/run.sh"]
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        env:
          - name: RUNNER_FEATURE_FLAG_ONCE
            value: "true"    # Ensures per-job ephemeral behavior

## Container mode (DinD for Docker-in-Docker support)
# containerMode:
#   type: "dind"

## Annotations for monitoring/observability
# metadata:
#   annotations:
#     prometheus.io/scrape: "true"
