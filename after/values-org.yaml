# =============================================================================
# Helm Values: Runner Scale Set (Organization Level)
# =============================================================================
# This values file configures a runner scale set for an entire organization.
# Legacy ARC required separate RunnerDeployment and autoscaler resources;
# Runner Scale Sets consolidate that complexity into a single values file.
#
# PRESENTATION TALKING POINT:
# "Org-level scale sets keep runner groups, but remove the old CRD sprawl."
# =============================================================================

## The scale set name becomes the single workflow target.
## This is simpler than legacy ARC's multi-label RunnerDeployment routing.
runnerScaleSetName: "arc-runner-set-org"

## GitHub configuration — targets the organization
githubConfigUrl: "https://github.com/seandorsett"

## Authentication — GitHub App recommended for org-level (better security)
## Create secret: kubectl create secret generic github-app-secret \
##   --namespace=arc-runners-org \
##   --from-literal=github_app_id=123456 \
##   --from-literal=github_app_installation_id=654321 \
##   --from-file=github_app_private_key=private-key.pem
githubConfigSecret: github-app-secret

## Runner group — controls which repos can access these runners
## Must be created in GitHub org settings first
runnerGroup: "production-runners"

## Auto-scaling configuration
## Unlike legacy ARC, scaling behavior lives in this one values file instead of
## a separate HorizontalRunnerAutoscaler resource. Runner Scale Sets can scale
## to zero; this example keeps 2 warm runners only to reduce org-wide latency.
maxRunners: 50       # Handle peak demand
minRunners: 2        # Warm capacity for demo/org latency; set 0 for scale-to-zero

## Runner pod template — still customizable without extra RunnerDeployment YAML
template:
  spec:
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command: ["/home/runner/run.sh"]
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "4000m"
            memory: "8Gi"
    # Node selection for dedicated runner nodes
    nodeSelector:
      role: github-runners
    # Tolerations for dedicated nodes
    tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "github-runners"
        effect: "NoSchedule"

