name: "AFTER: Scale Set Multi-Job Demo"
on:
  workflow_dispatch:

jobs:
  job-1:
    runs-on: arc-runner-set-repo
    steps:
      - name: "Job 1 - Unique Pod"
        run: |
          echo "=========================================="
          echo "  JOB 1 - PARALLEL SCALING DEMO"
          echo "=========================================="
          echo "📍 I'm running on pod: $(hostname)"
          echo "🆕 This is a unique, ephemeral pod"
          echo ""
          echo "👉 Run: kubectl get pods -n arc-runners"
          echo "   You should see MULTIPLE pods (one per job)!"
          sleep 10
          echo "✅ Job 1 complete"

  job-2:
    runs-on: arc-runner-set-repo
    steps:
      - name: "Job 2 - Different Pod"
        run: |
          echo "=========================================="
          echo "  JOB 2 - PARALLEL SCALING DEMO"
          echo "=========================================="
          echo "📍 I'm running on pod: $(hostname)"
          echo "🆕 This is a DIFFERENT pod than Job 1!"
          echo ""
          echo "Each job gets complete isolation:"
          echo "  - Separate filesystem"
          echo "  - Separate network namespace"
          echo "  - Separate process space"
          sleep 10
          echo "✅ Job 2 complete"

  job-3:
    runs-on: arc-runner-set-repo
    steps:
      - name: "Job 3 - Scaling Proof"
        run: |
          echo "=========================================="
          echo "  JOB 3 - PARALLEL SCALING DEMO"
          echo "=========================================="
          echo "📍 I'm running on pod: $(hostname)"
          echo ""
          echo "🚀 ARC scaled up 3 pods simultaneously!"
          echo "   Legacy ARC needed pre-created pools for this."
          echo "   Runner Scale Sets created them on-demand."
          echo ""
          echo "💰 After all jobs complete, pods are destroyed."
          echo "   Scale to zero = no idle cost."
          sleep 10
          echo "✅ Job 3 complete"

  summary:
    needs: [job-1, job-2, job-3]
    runs-on: arc-runner-set-repo
    steps:
      - name: "Summary"
        run: |
          echo "=========================================="
          echo "  ALL 3 PARALLEL JOBS COMPLETED!"
          echo "=========================================="
          echo ""
          echo "What just happened:"
          echo "  1. Three jobs were queued simultaneously"
          echo "  2. ARC created 3 separate pods (one per job)"
          echo "  3. Each pod ran its job in isolation"
          echo "  4. Each pod was destroyed after completion"
          echo "  5. This summary runs on a 4th pod!"
          echo ""
          echo "👉 After this completes, run:"
          echo "   kubectl get pods -n arc-runners"
          echo "   Result: No resources found (scale to zero!)"
