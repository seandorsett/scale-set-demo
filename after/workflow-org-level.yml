# =============================================================================
# AFTER: Workflow Using Runner Scale Set (Organization Level)
# =============================================================================
# This workflow uses an org-level runner scale set. The scale set belongs to
# a runner group that controls access across the organization without using
# legacy ARC's RunnerDeployment-based runner pools.
#
# PRESENTATION TALKING POINT:
# "Org-level scale sets keep runner groups, but replace legacy ARC's
#  pre-created pools with listener-driven ephemeral capacity."
# =============================================================================

name: "CI Pipeline (Runner Scale Set - Org Level)"

on:
  workflow_dispatch:
  # DEMO: For the live presentation we reuse the working repo-level scale set.
  # In production, this would normally point at a separate org-level scale set.
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # DEMO: Reusing the known-good scale set name from the live cluster.
    # In production, use a dedicated org-level scale set and runner group.
    runs-on: arc-runner-set-repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Explain org-level advantages
        run: |
          echo "✅ Org-level scale sets let multiple repositories share one GitHub-supported runner platform"
          echo "✅ Runner groups still control which repos get access"
          echo "✅ Unlike legacy ARC's warm pool, each job still lands on a fresh ephemeral pod"
          echo "✅ No RunnerDeployment or HorizontalRunnerAutoscaler CRDs are needed"
          echo "✅ Each job uses a short-lived token instead of legacy registration tokens"

      - name: Show pod identity
        run: |
          echo "Hostname: $(hostname)"
          echo "Kernel: $(uname -a)"

      - name: Demo shared CI workflow
        run: |
          echo "Simulating shared organization CI steps..."
          echo "Repository checked out on shared runner platform"
          echo "Running reusable org policy checks..."
          echo "Running standardized test stage..."
          echo "Job executed on listener-created ephemeral pod $(hostname)"

      - name: Explain live demo
        run: |
          echo "DEMO: Trigger via workflow_dispatch, then run:"
          echo "kubectl get pods -n arc-runners"
          echo "You will see a fresh pod appear for this job and disappear after."

# =============================================================================
# KEY DIFFERENCES FROM LEGACY ARC ORG-LEVEL APPROACH:
#
# 1. runs-on: One scale set name rather than legacy ARC label combinations
# 2. Listener-based scaling replaces legacy webhook/poll/HRA behavior
# 3. No RunnerDeployment or HorizontalRunnerAutoscaler CRDs
# 4. Ephemeral pods guarantee fresh state for every org job
# 5. Runner groups still provide access control
# 6. GitHub-managed ARC replaces community-maintained summerwind
# =============================================================================
