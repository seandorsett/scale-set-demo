# =============================================================================
# AFTER: Workflow Using Runner Scale Set (Repository Level)
# =============================================================================
# This workflow uses a runner scale set instead of legacy ARC's
# RunnerDeployment-based runner pool. Notice how much simpler it is.
#
# PRESENTATION TALKING POINT:
# "The workflow author just changes 'runs-on' to the scale set name.
#  No RunnerDeployment YAML, no HRA object, and no pre-created idle pool."
# =============================================================================

name: "CI Pipeline (Runner Scale Set - Repo Level)"

on:
  workflow_dispatch:
  # DEMO: Run this manually, then immediately run:
  # kubectl get pods -n arc-runners
  # You'll see Runner Scale Sets create a fresh pod for this job only.
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # NEW: Reference the runner scale set by name (the INSTALLATION_NAME)
    # No labels needed — the scale set name IS the identifier
    runs-on: arc-runner-set-repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Explain legacy ARC contrast
        run: |
          echo "✅ Unlike legacy ARC's pre-created runner pool, this pod was created just for this job"
          echo "✅ Runner Scale Sets use listener-based scaling instead of legacy webhook or poll loops"
          echo "✅ This runner uses a short-lived per-job token, not a long-lived registration token"
          echo "✅ When this workflow finishes, Kubernetes destroys the pod automatically"

      - name: Show pod identity
        run: |
          echo "Hostname: $(hostname)"
          echo "Kernel: $(uname -a)"

      - name: Demo CI build steps
        run: |
          echo "Checking out repository contents..."
          echo "Restoring dependencies..."
          echo "Running unit tests..."
          echo "Building application artifact..."
          echo "CI completed on per-job ephemeral runner pod $(hostname)"

      - name: Explain pod teardown
        run: |
          echo "DEMO: After this job completes, run:"
          echo "kubectl get pods -n arc-runners"
          echo "The runner pod used for this job will be gone."

# =============================================================================
# KEY DIFFERENCES FROM LEGACY ARC:
# 
# 1. runs-on: Uses one scale set label/name instead of legacy multi-label routing
# 2. No RunnerDeployment or HorizontalRunnerAutoscaler CRDs
# 3. Per-job ephemeral pods replace a pre-created runner pool
# 4. Listener-based scaling creates capacity only when jobs queue
# 5. Scale-to-zero removes idle cost when no jobs are queued
# =============================================================================
