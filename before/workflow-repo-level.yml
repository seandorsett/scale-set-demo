# =============================================================================
# BEFORE: Legacy ARC Workflow (Repository Level)
# =============================================================================
# This workflow is for the live demo. It runs on ubuntu-latest so it can be
# triggered reliably, but the comments and log output describe the OLD
# RunnerDeployment-based ARC experience.
# =============================================================================

name: "CI Pipeline (Legacy ARC - Repo Level)"

on:
  workflow_dispatch:

jobs:
  build:
    # LIVE DEMO NOTE:
    # We are NOT running legacy ARC in the demo environment.
    # With legacy ARC, this would typically have looked like:
    # runs-on: [self-hosted, linux, x64, legacy-arc, repo-demo]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Explain legacy ARC repo-level model
        run: |
          echo "🎭 LIVE DEMO: Simulating legacy ARC at the repository level"
          echo "Real legacy ARC used RunnerDeployment labels to route jobs."
          echo "Runners were often pre-created as a warm pool before jobs arrived."
          echo "That means idle runners still consumed cluster resources."
          echo "Scaling usually required HorizontalRunnerAutoscaler plus extra tuning."

      - name: Highlight repo-level pain points
        run: |
          echo "Legacy ARC repo-level pain points:"
          echo "- Labels assigned on the RunnerDeployment CRD"
          echo "- Long-lived runner pods handled multiple jobs over time"
          echo "- Complex webhook or pull-based autoscaling configuration"
          echo "- More YAML and CRD management for platform teams"

      - name: Simulate build
        run: |
          echo "🔧 Simulating a build on a legacy ARC runner"
          echo "In reality, this job may have landed on an already-running pooled runner."
          echo "If the warm pool is oversized, you pay idle cost."
          echo "If the autoscaler is misconfigured, jobs queue anyway."

      - name: Summarize before-state overhead
        run: |
          echo "Before state summary:"
          echo "Legacy ARC = RunnerDeployment + RunnerReplicaSet + Runner + HRA"
          echo "Plus cert-manager, controller management, and scaling complexity"
