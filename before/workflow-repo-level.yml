# THIS FILE IS FOR PRESENTATION REFERENCE ONLY
# It is NOT in .github/workflows/ — it cannot be triggered
# Walk through this file on screen to show what legacy ARC workflows looked like

name: "BEFORE: Legacy ARC Repo Workflow"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, linux, x64, legacy-arc, repo-demo]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner identity
        run: |
          echo "Legacy ARC repository runner"
          echo "Hostname: $(hostname)"
          echo "Kernel: $(uname -sr)"
          echo "Repository: $GITHUB_REPOSITORY"

      - name: Restore dependencies
        run: |
          echo "Restoring application dependencies"
          echo "Preparing build toolchain on long-lived runner"

      - name: Run build and test
        run: |
          echo "Running unit tests"
          echo "Building application artifact"
          echo "Publishing test summary"

      - name: Publish legacy ARC notes
        run: |
          echo "This workflow targeted a pre-created RunnerDeployment-backed pool."
          echo "The same runner pod could process multiple jobs over time."
          echo "Scaling behavior was managed separately through HorizontalRunnerAutoscaler."
