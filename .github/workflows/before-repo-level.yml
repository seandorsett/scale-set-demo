# =============================================================================
# BEFORE: Traditional Self-Hosted Runner Workflow (Repository Level)
# =============================================================================
# This workflow simulates the traditional repo-level self-hosted approach for a
# LIVE demo. It intentionally runs on ubuntu-latest so the presenter can launch
# it on demand, while the comments and log output call out the real pain points
# of managing persistent self-hosted runners.
# =============================================================================

name: "CI Pipeline (Traditional - Repo Runner)"

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # LIVE DEMO NOTE:
    # This runs on GitHub-hosted infrastructure for reliability during the demo.
    # In a real traditional setup this would typically be:
    # runs-on: [self-hosted, linux, x64]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Explain traditional runner pain points
        run: |
          echo "🎭 LIVE DEMO: Simulating a traditional REPO-LEVEL self-hosted runner"
          echo "This workflow runs on ubuntu-latest so it is easy to trigger live."
          echo "On a real self-hosted runner, this workspace would have leftover files from the last job."
          echo "No auto-scaling - if this runner is busy, your job queues indefinitely."
          echo "A platform owner would need to patch, monitor, and troubleshoot the runner VM."

      - name: Inspect workspace like an operator would
        run: |
          echo "Repository contents after checkout:"
          ls -la
          echo "On a real self-hosted runner, operators often inspect the filesystem to debug state drift."
          echo "If the previous job left artifacts behind, this build inherits them."

      - name: Simulate build setup
        run: |
          echo "🔧 Simulating dependency restore"
          echo "This is where npm ci, dotnet restore, or pip install would normally run."
          echo "Traditional pain point: old caches and dependencies may already exist on disk."
          echo "Traditional pain point: cleanup scripts become part of the pipeline just to stay reliable."

      - name: Simulate test execution
        run: |
          echo "🧪 Simulating test run"
          echo "In a real self-hosted environment, failures may come from runner drift instead of application code."
          echo "Examples: leftover temp files, modified permissions, stale containers, or changed environment variables."

      - name: Simulate artifact build
        run: |
          echo "🏗️ Simulating application build"
          echo "Build complete"
          echo "Real self-hosted concern: credentials, Docker layers, and artifacts may persist across jobs."

      - name: Manual cleanup required on traditional runners
        run: |
          echo "🧹 Manual cleanup step"
          rm -rf .demo-temp leftover-artifacts || true
          echo "On a real self-hosted runner, this cleanup is operational overhead you must remember to add."
          echo "Miss it once and the next job inherits whatever was left behind."

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate deploy talking points
        run: |
          echo "🚀 Simulating deployment from a traditional self-hosted runner"
          echo "On a real self-hosted runner, this machine may still have cached credentials from another workflow."
          echo "There is no per-job isolation like you get from ephemeral runners."
          echo "If the single repo runner is offline, this deployment waits until someone fixes it."
