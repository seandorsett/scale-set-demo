# =============================================================================
# BEFORE: Legacy ARC Workflow (Organization Level)
# =============================================================================
# This workflow simulates the old org-level ARC model for the live demo while
# running safely on ubuntu-latest.
# =============================================================================

name: "CI Pipeline (Legacy ARC - Org Level)"

on:
  workflow_dispatch:

jobs:
  build:
    # LIVE DEMO NOTE:
    # We are using ubuntu-latest for demo reliability.
    # In legacy ARC, an org-level runner setup might have used labels such as:
    # runs-on: [self-hosted, linux, x64, legacy-arc, org-shared]
    # Access would also be controlled through GitHub runner groups at the org level.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Explain org-level legacy ARC differences
        run: |
          echo "🎭 LIVE DEMO: Simulating legacy ARC at the organization level"
          echo "At org scope, teams often shared RunnerDeployments and label conventions."
          echo "GitHub runner groups controlled which repos could use those runners."
          echo "But scaling and pod management still lived in legacy ARC CRDs."

      - name: Highlight org-level scaling complexity
        run: |
          echo "Legacy ARC org-level pain points:"
          echo "- Shared RunnerDeployments require cross-team label coordination"
          echo "- HorizontalRunnerAutoscaler still needs careful min/max tuning"
          echo "- Webhook-based scaling adds more moving parts at org scale"
          echo "- Idle shared pools still burn cluster capacity between jobs"

      - name: Simulate org-level build
        run: |
          echo "🔧 Simulating an org-level build"
          echo "With legacy ARC, this job might run on a long-lived shared runner pod."
          echo "That pod could be reused by many workflows over time."
          echo "Operationally, platform teams own more YAML, more CRDs, and more scaling config."

      - name: Summarize org-level runner group story
        run: |
          echo "Org-level legacy ARC summary:"
          echo "- GitHub runner groups decide repository access"
          echo "- ARC labels on RunnerDeployment decide job placement"
          echo "- HorizontalRunnerAutoscaler decides pool size"
          echo "- Platform teams manage the complexity across all of it"
