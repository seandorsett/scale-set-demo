# =============================================================================
# BEFORE: Traditional Self-Hosted Runner Workflow (Organization Level)
# =============================================================================
# This workflow simulates the traditional org-level self-hosted approach for a
# LIVE demo. It runs on ubuntu-latest so the presenter can trigger it anytime,
# but the comments and echo statements highlight the shared-runner pain points.
# =============================================================================

name: "CI Pipeline (Traditional - Org Runner)"

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # LIVE DEMO NOTE:
    # This uses GitHub-hosted ubuntu-latest for demo reliability.
    # In a real traditional org-runner setup this would target a shared runner
    # group with self-hosted labels.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Explain org-level traditional pain points
        run: |
          echo "🎭 LIVE DEMO: Simulating a traditional ORG-LEVEL self-hosted runner"
          echo "This job runs on ubuntu-latest so it is safe to trigger live."
          echo "In a real org-level setup, multiple repositories may share the same long-lived machines."
          echo "Cross-repo contamination is a concern because shared state can leak between jobs."
          echo "If all shared runners are busy, jobs queue until capacity is manually added."

      - name: Simulate shared workspace inspection
        run: |
          echo "Repository contents after checkout:"
          ls -la
          echo "On a real org-level self-hosted runner, files from another repository could still be present."
          echo "Shared tools, caches, and temp data can make behavior inconsistent between teams."

      - name: Simulate build and validation
        run: |
          echo "🔧 Simulating shared runner build"
          echo "Pretend we restored dependencies and ran repository validation."
          echo "Traditional pain point: globally installed tools may differ between teams and repositories."
          echo "Traditional pain point: one team's customization can affect another team's jobs."

      - name: Simulate security and compliance concerns
        run: |
          echo "🔐 Simulating security scan"
          echo "On persistent org runners, previously-installed packages from other repos remain on the machine."
          echo "Shared state increases the blast radius when secrets or credentials are mishandled."

      - name: Manual cleanup on shared runner
        run: |
          echo "🧹 Simulating manual cleanup on a shared org runner"
          rm -rf .demo-temp shared-cache || true
          echo "Without deliberate cleanup, the next repository inherits whatever was left on disk."

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summarize shared-runner overhead
        run: |
          echo "📣 Org-level traditional runner summary"
          echo "If this were a real shared self-hosted runner:"
          echo "- Multiple repositories could leave state behind on the same machine"
          echo "- Capacity planning would be manual"
          echo "- Troubleshooting often starts with 'is it the runner or the code?'"
          echo "- Cleanup and standardization become a platform engineering burden"
