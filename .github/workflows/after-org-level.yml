# =============================================================================
# AFTER: Workflow Using Runner Scale Set (Organization Level)
# =============================================================================
# This workflow uses an org-level runner scale set. The scale set belongs to
# a runner group that controls access across the organization.
#
# PRESENTATION TALKING POINT:
# "Org-level scale sets give you shared infrastructure with auto-scaling.
#  Runner groups control which repos get access — same as before, but now
#  with dynamic capacity."
# =============================================================================

name: "CI Pipeline (Runner Scale Set - Org Level)"

on:
  workflow_dispatch:
  # DEMO: For the live presentation we reuse the working repo-level scale set.
  # In production, this would normally point at a separate org-level scale set.
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # DEMO: Reusing the known-good scale set name from the live cluster.
    # In production, use a dedicated org-level scale set and runner group.
    runs-on: arc-runner-set-repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Explain org-level advantages
        run: |
          echo "✅ Org-level runners let multiple repositories share one runner platform"
          echo "✅ Runner groups still control which repos get access"
          echo "✅ Every job still lands on a fresh ephemeral pod"
          echo "✅ Centralized capacity with auto-scaling is easier to operate"

      - name: Show pod identity
        run: |
          echo "Hostname: $(hostname)"
          echo "Kernel: $(uname -a)"

      - name: Demo shared CI workflow
        run: |
          echo "Simulating shared organization CI steps..."
          echo "Repository checked out on shared runner platform"
          echo "Running reusable org policy checks..."
          echo "Running standardized test stage..."
          echo "Job executed on ephemeral pod $(hostname)"

      - name: Explain live demo
        run: |
          echo "DEMO: Trigger via workflow_dispatch, then run:"
          echo "kubectl get pods -n arc-runners"
          echo "You will see a fresh pod appear for this job and disappear after."

# =============================================================================
# KEY DIFFERENCES FROM TRADITIONAL ORG-LEVEL APPROACH:
#
# 1. runs-on: Scale set name (not group + labels combo)
# 2. Auto-scaling: 2 warm runners, scales up to 50 on demand
# 3. No cleanup: Ephemeral pods = guaranteed fresh state
# 4. Cost efficient: Scales down to minRunners during quiet periods
# 5. Runner groups: Still used for access control (configured in values.yaml)
# 6. Security: Kubernetes namespace isolation + ephemeral pods
# =============================================================================
