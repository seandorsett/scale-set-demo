name: "AFTER: Runner Scale Set Demo"
on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Custom message to display'
        required: false
        default: 'Hello from Runner Scale Sets!'

jobs:
  build:
    runs-on: arc-runner-set-repo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "✅ Ephemeral Pod Identity"
        run: |
          echo "=========================================="
          echo "  RUNNER SCALE SET - LIVE DEMO"
          echo "=========================================="
          echo ""
          echo "📍 Pod hostname:  $(hostname)"
          echo "🐧 OS:            $(uname -sr)"
          echo "🕐 Started at:    $(date -u)"
          echo "💬 Message:        ${{ github.event.inputs.message }}"
          echo ""
          echo "🆕 This pod was created JUST for this job."
          echo "💥 It will be DESTROYED when this job completes."
          echo ""
          echo "👉 Run this in your terminal NOW:"
          echo "   kubectl get pods -n arc-runners"

      - name: "✅ Clean Environment Proof"
        run: |
          echo "=========================================="
          echo "  PROVING EPHEMERAL CLEAN STATE"
          echo "=========================================="
          echo ""
          echo "📂 Workspace is fresh (no leftover files):"
          ls -la
          echo ""
          echo "📦 No cached packages from previous jobs:"
          echo "   /tmp contents: $(ls /tmp | wc -l) files"
          echo ""
          echo "🔐 No leaked credentials from other jobs"
          echo "   HOME: $HOME"
          echo "   USER: $(whoami)"

      - name: "✅ Simulate CI Build"
        run: |
          echo "Building application..."
          sleep 2
          echo "Running tests..."
          sleep 2
          echo "✅ Build complete!"
          echo ""
          echo "⏱️  Total job time: fast because no pool warmup needed"
          echo "💰 Cost: only charged for this job's duration"
          echo "🔄 Next job gets a BRAND NEW pod"

      - name: "✅ Contrast with Legacy ARC"
        run: |
          echo "=========================================="
          echo "  WHY THIS IS BETTER THAN LEGACY ARC"
          echo "=========================================="
          echo ""
          echo "Legacy ARC (RunnerDeployment):"
          echo "  ❌ Pre-created pool of runners sitting idle"
          echo "  ❌ cert-manager dependency required"
          echo "  ❌ RunnerDeployment + HorizontalRunnerAutoscaler CRDs"
          echo "  ❌ Webhook/poll-based scaling (complex setup)"
          echo "  ❌ Long-lived pods may accumulate state"
          echo ""
          echo "Runner Scale Sets (this demo):"
          echo "  ✅ Pod created on-demand, destroyed after job"
          echo "  ✅ No cert-manager needed"
          echo "  ✅ Simple Helm chart (no CRDs to manage)"
          echo "  ✅ Listener-based scaling (built-in)"
          echo "  ✅ Scale to zero when idle"
          echo ""
          echo "👉 After this job ends, run:"
          echo "   kubectl get pods -n arc-runners"
          echo "   (You'll see: No resources found)"
