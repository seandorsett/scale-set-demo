# =============================================================================
# AFTER: Workflow Using Runner Scale Set (Repository Level)
# =============================================================================
# This workflow uses a runner scale set instead of traditional self-hosted
# runners. Notice how much simpler and more secure it is.
#
# PRESENTATION TALKING POINT:
# "The workflow author just changes 'runs-on' to the scale set name.
#  Everything else — scaling, state isolation, registration — is automatic."
# =============================================================================

name: "CI Pipeline (Runner Scale Set - Repo Level)"

on:
  workflow_dispatch:
  # DEMO: Run this manually, then immediately run:
  # kubectl get pods -n arc-runners
  # You'll see ARC create a fresh ephemeral runner pod for this job.
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # NEW: Reference the runner scale set by name (the INSTALLATION_NAME)
    # No labels needed — the scale set name IS the identifier
    runs-on: arc-runner-set-repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Explain ephemeral runner benefits
        run: |
          echo "✅ This is a fresh ephemeral pod - no leftover state!"
          echo "✅ ARC created this runner only when the job was queued"
          echo "✅ When this workflow finishes, Kubernetes destroys the pod"
          echo "✅ No cached credentials, tools, or workspace from prior runs"

      - name: Show pod identity
        run: |
          echo "Hostname: $(hostname)"
          echo "Kernel: $(uname -a)"

      - name: Demo CI build steps
        run: |
          echo "Checking out repository contents..."
          echo "Restoring dependencies..."
          echo "Running unit tests..."
          echo "Building application artifact..."
          echo "CI completed on ephemeral runner pod $(hostname)"

      - name: Explain pod teardown
        run: |
          echo "DEMO: After this job completes, run:"
          echo "kubectl get pods -n arc-runners"
          echo "The runner pod used for this job will be gone."

# =============================================================================
# KEY DIFFERENCES FROM TRADITIONAL APPROACH:
# 
# 1. runs-on: Uses scale set name instead of label array
# 2. No cleanup steps: Runners are ephemeral (fresh every job)
# 3. Auto-scaling: ARC creates a pod on demand, destroys after
# 4. Security: No state leakage between jobs
# 5. Cost: Scales to zero when no jobs are queued
# =============================================================================
